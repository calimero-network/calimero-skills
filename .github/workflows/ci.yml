name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Lint/test only reads the repo.
permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint markdown
        run: npm run lint:md

      - name: Validate skills (structure, content rules, version pins)
        run: npm test
